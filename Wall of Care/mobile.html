<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love in Action - Share Your Photo</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 0;
            background: url('mobile background.jpg') no-repeat center center fixed; 
            background-size: cover;
            min-height: 100vh;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .content-container {
            margin-top: -10vh; 
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* New container to hold the buttons side-by-side */
        .button-group {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 15px; /* Adds space between the buttons */
            width: 100%;
            max-width: 400px; /* Prevents them from getting too wide on tablets */
            z-index: 2;
        }

        button { 
            /* Let the buttons share the available width equally */
            flex: 1;
            height: 60px;
            margin: 0; 
            
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 10px;

            /* Slightly smaller font to ensure "Upload from Phone" fits on mobile */
            font-size: 16px; 
            line-height: 1.2;
            font-weight: bold;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            color: #333;
            background: #fff; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        #status {
            /* Restored to original position since buttons are back on one row */
            position: absolute;
            top: 85px; 
            width: 100%;
            margin: 0;
            font-weight: bold;
            color: #fff; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        #preview { 
            /* Restored to original position */
            position: absolute;
            top: 110px; 
            max-width: 80%; 
            max-height: 45vh; 
            object-fit: contain;
            border-radius: 12px; 
            display: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
    </style>
</head>
<body>
    <div class="content-container">
        <!-- Hidden Inputs -->
        <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none;">
        <input type="file" id="uploadInput" accept="image/*" style="display:none;">
        
        <!-- Button Group for Side-by-Side Layout -->
        <div class="button-group">
            <button onclick="document.getElementById('fileInput').click()">Take a Photo</button>
            <button onclick="document.getElementById('uploadInput').click()">Upload from Phone</button>
        </div>

        <p id="status"></p>
        
        <!-- Image preview element -->
        <img id="preview" alt="Your Photo">
    </div>

    <script>
        // PASTE YOUR GOOGLE SCRIPT WEB APP URL HERE
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyb5VB_8xCDQk5b05TwxJIa_hWk02ujSca7BGhI3lGHmCbPAyg_HAqrDlzeWFAdxIYCA/exec';
        
        // Define the new frame image source
        const BORDER_IMAGE_SRC = 'Frame.png';

        function handleImageSelection(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "Applying protection frame...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const userImageUrl = e.target.result;
                createCompositeImage(userImageUrl, file.name);
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('fileInput').addEventListener('change', handleImageSelection);
        document.getElementById('uploadInput').addEventListener('change', handleImageSelection);

        function createCompositeImage(userImageUrl, originalFileName) {
            const borderImg = new Image();
            borderImg.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const TARGET_WIDTH = 1080;
                const TARGET_HEIGHT = Math.round(borderImg.height * (TARGET_WIDTH / borderImg.width));
                
                canvas.width = TARGET_WIDTH;
                canvas.height = TARGET_HEIGHT;

                const userImg = new Image();
                userImg.onload = function() {
                    const PHOTO_AREA_WIDTH = 1080;
                    const PHOTO_AREA_HEIGHT = 1300;

                    const scale = Math.max(PHOTO_AREA_WIDTH / userImg.width, PHOTO_AREA_HEIGHT / userImg.height);
                    const drawWidth = userImg.width * scale;
                    const drawHeight = userImg.height * scale;

                    const x = (PHOTO_AREA_WIDTH - drawWidth) / 2;
                    const y = (PHOTO_AREA_HEIGHT - drawHeight) / 2;

                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(0, 0, PHOTO_AREA_WIDTH, PHOTO_AREA_HEIGHT);
                    ctx.clip();
                    ctx.drawImage(userImg, x, y, drawWidth, drawHeight);
                    ctx.restore();

                    ctx.drawImage(borderImg, 0, 0, TARGET_WIDTH, TARGET_HEIGHT);
                    
                    const compositeDataUrl = canvas.toDataURL('image/png');
                    const base64Data = compositeDataUrl.split(',')[1]; 
                    
                    const previewEl = document.getElementById('preview');
                    previewEl.src = compositeDataUrl;
                    previewEl.style.display = 'block'; 

                    uploadToDrive(base64Data, originalFileName);
                };
                userImg.src = userImageUrl;
            };
            borderImg.src = BORDER_IMAGE_SRC;
        }

        function uploadToDrive(base64Data, fileName) {
            document.getElementById('status').innerText = "Uploading to screen...";
            
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    name: 'framed_' + fileName,
                    type: 'image/png',
                    base64: base64Data
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('status').innerText = "Success! Look at the big screen.";
            })
            .catch(err => {
                document.getElementById('status').innerText = "Upload failed. Try again.";
                console.error(err);
            });
        }
    </script>
</body>
</html>
