<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love in Action - Share Your Photo</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 0;
            background: url('mobile background.jpg') no-repeat center center fixed; 
            background-size: cover;
            min-height: 100vh;
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- NEW CONSENT MODAL STYLES --- */
        #consentModal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            text-align: left;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal-content h2 { margin-top: 0; text-align: center; color: #333;}
        
        #fullName {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 25px;
        }

        .checkbox-container input[type="checkbox"] {
            margin-top: 4px;
            transform: scale(1.3);
            cursor: pointer;
        }

        .checkbox-container label {
            font-size: 14px;
            color: #444;
            line-height: 1.5;
            cursor: pointer;
        }

        #consentBtn {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        #consentBtn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }
        
        #consentStatus {
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            margin-bottom: 0;
            color: #666;
        }
        /* ------------------------------- */

        .content-container {
            margin-top: -10vh; 
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            
            position: relative; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .button-group {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 15px; 
            width: 100%;
            max-width: 400px; 
            z-index: 2;
        }

        button.action-btn { 
            flex: 1;
            height: 60px;
            margin: 0; 
            
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 10px;

            font-size: 16px; 
            line-height: 1.2;
            font-weight: bold;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            color: #333;
            background: #fff; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        #status {
            position: absolute;
            top: 85px; 
            width: 100%;
            margin: 0;
            font-weight: bold;
            color: #fff; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        #preview { 
            position: absolute;
            top: 110px; 
            max-width: 80%; 
            max-height: 45vh; 
            object-fit: contain;
            border-radius: 12px; 
            display: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }
    </style>
</head>
<body>

    <!-- NEW: Consent Modal Overlay -->
    <div id="consentModal">
        <div class="modal-content">
            <h2>Participant Consent</h2>
            <input type="text" id="fullName" placeholder="Full Name (Required)" required>
            
            <div class="checkbox-container">
                <input type="checkbox" id="consentCheck">
                <label for="consentCheck">
                    I acknowledge that I have read and understood this consent notice and I agree to participate. I voluntarily agree to upload my photo for display on the event screen during the World Immunization Week event on May 6, 2026. I understand that I can withdraw my consent at any time during the event by contacting the event team or email aya.awad@sanofi.com, and my photo will be immediately removed from the screen.
                </label>
            </div>
            
            <button id="consentBtn" disabled>I Consent</button>
            <p id="consentStatus"></p>
        </div>
    </div>

    <!-- Original UI (Hidden initially behind the modal) -->
    <div class="content-container">
        <input type="file" id="fileInput" accept="image/*" capture="camera" style="display:none;">
        <input type="file" id="uploadInput" accept="image/*" style="display:none;">
        
        <div class="button-group">
            <button class="action-btn" onclick="document.getElementById('fileInput').click()">Take a Photo</button>
            <button class="action-btn" onclick="document.getElementById('uploadInput').click()">Upload from Phone</button>
        </div>

        <p id="status"></p>
        <img id="preview" alt="Your Photo">
    </div>

    <script>
        // --- CONSENT LOGIC ---
        // PASTE YOUR NEW CONSENT SCRIPT URL HERE
        const CONSENT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzKA3QRl0TtylbG_aP2QxIgRglAOYZsYILPiLUp-4D48x57gyWuKICxhHk2Hgro0Z80/exec';
        
        const consentModal = document.getElementById('consentModal');
        const fullNameInput = document.getElementById('fullName');
        const consentCheck = document.getElementById('consentCheck');
        const consentBtn = document.getElementById('consentBtn');
        const consentStatus = document.getElementById('consentStatus');

        function validateConsent() {
            // Button is active ONLY if name is not empty AND checkbox is checked
            if (fullNameInput.value.trim() !== '' && consentCheck.checked) {
                consentBtn.disabled = false;
            } else {
                consentBtn.disabled = true;
            }
        }

        fullNameInput.addEventListener('input', validateConsent);
        consentCheck.addEventListener('change', validateConsent);

        consentBtn.addEventListener('click', () => {
            consentBtn.disabled = true;
            consentStatus.innerText = "Saving consent...";

            fetch(CONSENT_SCRIPT_URL, {
                method: 'POST',
                // Mode 'no-cors' can be used if you hit CORS issues, but getting the JSON response requires standard CORS
                body: JSON.stringify({
                    name: fullNameInput.value.trim(),
                    response: "I consent"
                })
            })
            .then(response => response.json())
            .then(data => {
                // Remove the modal to let the user use the app
                consentModal.style.display = 'none';
            })
            .catch(err => {
                consentStatus.innerText = "Error saving. Please try again.";
                consentStatus.style.color = "red";
                consentBtn.disabled = false;
                console.error(err);
                
                // Fallback: If you want to let them proceed even if the sheet fails, 
                // uncomment the line below. Otherwise, it forces a successful log.
                // consentModal.style.display = 'none';
            });
        });


        // --- ORIGINAL APP LOGIC ---
        const IMAGE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyb5VB_8xCDQk5b05TwxJIa_hWk02ujSca7BGhI3lGHmCbPAyg_HAqrDlzeWFAdxIYCA/exec';
        const BORDER_IMAGE_SRC = 'Frame.png';

        function handleImageSelection(event) {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('status').innerText = "Applying protection frame...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const userImageUrl = e.target.result;
                createCompositeImage(userImageUrl, file.name);
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('fileInput').addEventListener('change', handleImageSelection);
        document.getElementById('uploadInput').addEventListener('change', handleImageSelection);

        function createCompositeImage(userImageUrl, originalFileName) {
            const borderImg = new Image();
            borderImg.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                const TARGET_WIDTH = 1080;
                const TARGET_HEIGHT = Math.round(borderImg.height * (TARGET_WIDTH / borderImg.width));
                
                canvas.width = TARGET_WIDTH;
                canvas.height = TARGET_HEIGHT;

                const userImg = new Image();
                userImg.onload = function() {
                    const PHOTO_AREA_WIDTH = 1080;
                    const PHOTO_AREA_HEIGHT = 1300;

                    const scale = Math.max(PHOTO_AREA_WIDTH / userImg.width, PHOTO_AREA_HEIGHT / userImg.height);
                    const drawWidth = userImg.width * scale;
                    const drawHeight = userImg.height * scale;

                    const x = (PHOTO_AREA_WIDTH - drawWidth) / 2;
                    const y = (PHOTO_AREA_HEIGHT - drawHeight) / 2;

                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.save();
                    ctx.beginPath();
                    ctx.rect(0, 0, PHOTO_AREA_WIDTH, PHOTO_AREA_HEIGHT);
                    ctx.clip();
                    ctx.drawImage(userImg, x, y, drawWidth, drawHeight);
                    ctx.restore();

                    ctx.drawImage(borderImg, 0, 0, TARGET_WIDTH, TARGET_HEIGHT);
                    
                    const compositeDataUrl = canvas.toDataURL('image/png');
                    const base64Data = compositeDataUrl.split(',')[1]; 
                    
                    const previewEl = document.getElementById('preview');
                    previewEl.src = compositeDataUrl;
                    previewEl.style.display = 'block'; 

                    uploadToDrive(base64Data, originalFileName);
                };
                userImg.src = userImageUrl;
            };
            borderImg.src = BORDER_IMAGE_SRC;
        }

        function uploadToDrive(base64Data, fileName) {
            document.getElementById('status').innerText = "Uploading to screen...";
            
            fetch(IMAGE_SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    name: 'framed_' + fileName,
                    type: 'image/png',
                    base64: base64Data
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('status').innerText = "Success! Look at the big screen.";
            })
            .catch(err => {
                document.getElementById('status').innerText = "Upload failed. Try again.";
                console.error(err);
            });
        }
    </script>
</body>
</html>
