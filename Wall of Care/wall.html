<!DOCTYPE html>
<html>
<head>
    <title>Live Photo Wall</title>
    <style>
        body { 
            /* Changed to Viewport units for dynamic scaling */
            width: 100vw;
            height: 100vh;
            background: url('wall 3.png') no-repeat center center; 
            background-size: cover; /* Ensures the image fills the screen */
            overflow: hidden; 
            margin: 0; 
            position: relative;
        }
        
        #photo-container { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 0;
            left: 0;
            z-index: 10; /* Ensures photos stay on top of the colored zones */
        }
        

        .polaroid {
            position: absolute;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            width: 120px; /* Size of the image on the wall */
            animation: fadeIn 1.5s ease-in-out; 
            transition: opacity 0.5s;
        }
        
        .polaroid img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <!-- Colored zones to visualize the restricted areas -->
    <div id="outer-frame"></div>
    <div id="exclusion-zone"></div>
    <div id="photo-container"></div>

    <script>
        // PASTE YOUR GOOGLE SCRIPT WEB APP URL HERE
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyb5VB_8xCDQk5b05TwxJIa_hWk02ujSca7BGhI3lGHmCbPAyg_HAqrDlzeWFAdxIYCA/exec';
        
        let displayedPhotos = new Set(); 
        let onScreenImages = []; 

        const MAX_ON_SCREEN = 50; 
        const FRAME_MARGIN = 20; 

        // Dynamic dimension variables
        let SCREEN_W, SCREEN_H;
        let EXCLUDE_X_MIN, EXCLUDE_X_MAX, EXCLUDE_Y_MIN, EXCLUDE_Y_MAX;

        const IMG_BOX_WIDTH = 135; 
        const IMG_BOX_HEIGHT = 165; 

        function updateScreenDimensions() {
            SCREEN_W = window.innerWidth;
            SCREEN_H = window.innerHeight;

            EXCLUDE_X_MIN = SCREEN_W * 0.30; 
            EXCLUDE_X_MAX = SCREEN_W * 0.70; 
            EXCLUDE_Y_MIN = SCREEN_H * 0.02; 
            EXCLUDE_Y_MAX = SCREEN_H * 0.80;

            const ez = document.getElementById('exclusion-zone');
            if (ez) {
                ez.style.left = EXCLUDE_X_MIN + 'px';
                ez.style.width = (EXCLUDE_X_MAX - EXCLUDE_X_MIN) + 'px';
                ez.style.top = EXCLUDE_Y_MIN + 'px';
                ez.style.height = (EXCLUDE_Y_MAX - EXCLUDE_Y_MIN) + 'px';
            }

            const outer = document.getElementById('outer-frame');
            if (outer) {
                outer.style.width = SCREEN_W + 'px';
                outer.style.height = SCREEN_H + 'px';
                outer.style.borderWidth = FRAME_MARGIN + 'px';
                outer.style.boxSizing = "border-box"; 
            }
        }

        document.addEventListener("DOMContentLoaded", updateScreenDimensions);
        window.addEventListener('resize', updateScreenDimensions);

        function fetchPhotos() {
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(fileIds => {
                    fileIds.forEach(id => {
                        if (!displayedPhotos.has(id)) {
                            displayedPhotos.add(id);
                            displayPhoto(id);
                        }
                    });
                });
        }

        // --- THE GATEKEEPER ---
        // This function guarantees an area is 100% safe.
        function isStrictlySafe(x, y) {
            const rightEdge = x + IMG_BOX_WIDTH;
            const bottomEdge = y + IMG_BOX_HEIGHT;

            // 1. ABSOLUTE EXCLUSION ZONE CHECK
            const inExclusionX = (x < EXCLUDE_X_MAX) && (rightEdge > EXCLUDE_X_MIN);
            const inExclusionY = (y < EXCLUDE_Y_MAX) && (bottomEdge > EXCLUDE_Y_MIN);
            if (inExclusionX && inExclusionY) {
                return false; // FAILED: Inside exclusion zone
            }

            // 2. OVERLAP CHECK
            for (let i = 0; i < onScreenImages.length; i++) {
                let existingBox = onScreenImages[i].box;
                if (x < existingBox.x + existingBox.w + 2 &&
                    rightEdge + 2 > existingBox.x &&
                    y < existingBox.y + existingBox.h + 2 &&
                    bottomEdge + 2 > existingBox.y) {
                    return false; // FAILED: Overlaps another image
                }
            }
            
            return true; // PASSED: Safe to place
        }

        function getRandomPosition() {
            let x, y;
            let safetyCounter = 0; 

            while (safetyCounter < 1500) {
                x = Math.floor(Math.random() * (SCREEN_W - IMG_BOX_WIDTH - (FRAME_MARGIN * 2))) + FRAME_MARGIN;
                y = Math.floor(Math.random() * (SCREEN_H - IMG_BOX_HEIGHT - (FRAME_MARGIN * 2))) + FRAME_MARGIN;

                if (isStrictlySafe(x, y)) {
                    return { x, y, w: IMG_BOX_WIDTH, h: IMG_BOX_HEIGHT };
                }
                safetyCounter++;
            }
            
            return null; // Could not find a safe random spot
        }

        function displayPhoto(fileId) {
            const container = document.getElementById('photo-container');
            let safePos = getRandomPosition();

            // FIFO LOGIC
            if (!safePos || onScreenImages.length >= MAX_ON_SCREEN) {
                let oldestImage = onScreenImages.shift(); 
                oldestImage.element.remove(); 

                if (!safePos) {
                    // Check if the old image's spot is STILL strictly safe (in case window resized)
                    if (isStrictlySafe(oldestImage.box.x, oldestImage.box.y)) {
                        safePos = oldestImage.box;
                    } else {
                        // If the old spot is now in the exclusion zone, we must find a new one
                        safePos = getRandomPosition();
                    }
                }
            }

            // --- FINAL SAFETY CATCH ---
            // If the code reaches this point and still doesn't have a safe spot, 
            // it aborts completely rather than risking the exclusion zone.
            if (!safePos) {
                console.log("Image aborted: No safe space available outside exclusion zone.");
                return; 
            }

            const div = document.createElement('div');
            div.className = 'polaroid';
            
            const imgUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
            div.innerHTML = `<img src="${imgUrl}">`;

            const randomRotation = Math.floor(Math.random() * 30) - 15;

            div.style.left = `${safePos.x}px`;
            div.style.top = `${safePos.y}px`;
            div.style.transform = `rotate(${randomRotation}deg)`;

            container.appendChild(div);

            onScreenImages.push({
                element: div,
                box: safePos
            });
        }

        setInterval(fetchPhotos, 5000);
        fetchPhotos(); 
    </script>
</body>
</html>
