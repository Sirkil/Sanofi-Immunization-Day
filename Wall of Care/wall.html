<!DOCTYPE html>
<html>
<head>
    <title>Live Photo Wall</title>
    <style>
        body { 
            /* Fixed exact dimensions for the big screen */
            width: 1701px;
            height: 1134px;
            background: url('wall.png') no-repeat center center; 
            background-size: cover; 
            overflow: hidden; 
            margin: 0; 
            position: relative;
        }
        
        #photo-container { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 0;
            left: 0;
        }
        
        .polaroid {
            position: absolute;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            width: 120px; /* Size of the image on the wall */
            animation: fadeIn 1.5s ease-in-out; 
            /* Added transition for smoother potential overlapping fallback */
            transition: opacity 0.5s;
        }
        
        .polaroid img { 
            width: 100%; 
            height: auto; 
            display: block; 
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <!-- Colored zones to visualize the restricted areas -->
    <div id="outer-frame"></div>
    <div id="exclusion-zone"></div>
    <div id="photo-container"></div>

    <script>
        // PASTE YOUR GOOGLE SCRIPT WEB APP URL HERE
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzyb5VB_8xCDQk5b05TwxJIa_hWk02ujSca7BGhI3lGHmCbPAyg_HAqrDlzeWFAdxIYCA/exec';
        
        let displayedPhotos = new Set(); // Tracks what Drive files we have already seen
        let onScreenImages = []; // Tracks the actual DOM elements and their physical locations

        const MAX_ON_SCREEN = 50; 
        const SCREEN_W = 1701;
        const SCREEN_H = 1134;

        // Define the exact restricted area (middle column for Logo + QR)
        const EXCLUDE_X_MIN = SCREEN_W * 0.30; 
        const EXCLUDE_X_MAX = SCREEN_W * 0.70; 
        const EXCLUDE_Y_MIN = SCREEN_H * 0.02; 
        const EXCLUDE_Y_MAX = SCREEN_H * 0.75;

        const FRAME_MARGIN = 20; 

        document.addEventListener("DOMContentLoaded", () => {
            const ez = document.getElementById('exclusion-zone');
            ez.style.left = EXCLUDE_X_MIN + 'px';
            ez.style.width = (EXCLUDE_X_MAX - EXCLUDE_X_MIN) + 'px';
            ez.style.top = EXCLUDE_Y_MIN + 'px';
            ez.style.height = (EXCLUDE_Y_MAX - EXCLUDE_Y_MIN) + 'px';

            const outer = document.getElementById('outer-frame');
            outer.style.width = SCREEN_W + 'px';
            outer.style.height = SCREEN_H + 'px';
            outer.style.borderWidth = FRAME_MARGIN + 'px';
        });

        function fetchPhotos() {
            fetch(SCRIPT_URL)
                .then(response => response.json())
                .then(fileIds => {
                    fileIds.forEach(id => {
                        if (!displayedPhotos.has(id)) {
                            displayedPhotos.add(id);
                            displayPhoto(id);
                        }
                    });
                });
        }

        function getRandomPosition() {
            // Box size for collision calculation (slightly larger than 120px to account for rotation/margins)
            const imgBoxWidth = 135; 
            const imgBoxHeight = 165; 
            
            let x, y;
            let validPosition = false;
            let safetyCounter = 0; 

            // Increased safety counter to 3000 because fitting 50 non-overlapping boxes is a tight squeeze
            while (!validPosition && safetyCounter < 3000) {
                x = Math.floor(Math.random() * (SCREEN_W - imgBoxWidth - (FRAME_MARGIN * 2))) + FRAME_MARGIN;
                y = Math.floor(Math.random() * (SCREEN_H - imgBoxHeight - (FRAME_MARGIN * 2))) + FRAME_MARGIN;

                const imgRightEdge = x + imgBoxWidth;
                const imgBottomEdge = y + imgBoxHeight;

                // 1. Check if it enters the inner exclusion zone
                const overlapsX = (x < EXCLUDE_X_MAX) && (imgRightEdge > EXCLUDE_X_MIN);
                const overlapsY = (y < EXCLUDE_Y_MAX) && (imgBottomEdge > EXCLUDE_Y_MIN);
                const inExclusionZone = overlapsX && overlapsY;

                // 2. Check if it overlaps with any currently displayed image
                let overlapsOtherImage = false;
                if (!inExclusionZone) {
                    for (let i = 0; i < onScreenImages.length; i++) {
                        let existingBox = onScreenImages[i].box;
                        // A buffer of 2 pixels so they don't touch perfectly flush
                        if (x < existingBox.x + existingBox.w + 2 &&
                            imgRightEdge + 2 > existingBox.x &&
                            y < existingBox.y + existingBox.h + 2 &&
                            imgBottomEdge + 2 > existingBox.y) {
                            
                            overlapsOtherImage = true;
                            break; 
                        }
                    }
                }

                // If it's safe from the middle AND safe from other images, accept coordinates
                if (!inExclusionZone && !overlapsOtherImage) {
                    validPosition = true;
                }
                safetyCounter++;
            }
            
            // Note: If safetyCounter hits 3000 (screen is completely full), it will fallback to the last generated X/Y
            return { x, y, w: imgBoxWidth, h: imgBoxHeight };
        }

        function displayPhoto(fileId) {
            const container = document.getElementById('photo-container');

            // --- THE 50 IMAGE LIMIT LOGIC ---
            // If we already have 50 images on the screen, remove the oldest one
            if (onScreenImages.length >= MAX_ON_SCREEN) {
                // Remove the first item from the array (which is the oldest)
                const oldestImage = onScreenImages.shift(); 
                // Physically remove it from the HTML DOM
                oldestImage.element.remove(); 
            }

            const div = document.createElement('div');
            div.className = 'polaroid';
            
            const imgUrl = `https://drive.google.com/thumbnail?id=${fileId}&sz=w800`;
            div.innerHTML = `<img src="${imgUrl}">`;

            // Get a safe, non-overlapping spot
            const safePos = getRandomPosition();
            const randomRotation = Math.floor(Math.random() * 30) - 15;

            div.style.left = `${safePos.x}px`;
            div.style.top = `${safePos.y}px`;
            div.style.transform = `rotate(${randomRotation}deg)`;

            container.appendChild(div);

            // Add this new image and its bounding box to our active tracking array
            onScreenImages.push({
                element: div,
                box: safePos
            });
        }

        setInterval(fetchPhotos, 5000);
        fetchPhotos(); 
    </script>
</body>
</html>
